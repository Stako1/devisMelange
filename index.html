<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Devis Pro — Mélange Imprimerie</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,'Times New Roman',serif;background:#f8f7f4;color:#1a1a1a;font-size:14px}
input,select,textarea,button{font-family:inherit}
header{background:#fff;border-bottom:2px solid #1a1a1a;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:8px}
.logo-app{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-app img{height:34px;width:80px;object-fit:contain;display:block}
.logo-app span{font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:.06em}
.btn{border:none;border-radius:7px;font-weight:600;cursor:pointer;transition:all .15s;padding:8px 14px;font-size:13px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn-primary{background:#1a1a1a;color:#fff}.btn-primary:hover{background:#333}
.btn-ghost{background:transparent;color:#374151;border:1px solid #d1d5db}.btn-ghost:hover{background:#f3f4f6}
.btn-danger{background:transparent;color:#ef4444;border:1px solid #fecaca}
.btn-red{background:#c8001e;color:#fff}.btn-red:hover{background:#a0001a}
.btn-purple{background:#7c3aed;color:#fff}.btn-purple:hover{background:#6d28d9}
.btn-sm{padding:5px 8px;font-size:11px}
.hdr-actions{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.main{max-width:980px;margin:20px auto;padding:0 12px}
@media(min-width:640px){.main{padding:0 20px;margin:28px auto}}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px;margin-bottom:14px}
.card-title{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#6b7280;margin-bottom:10px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.grid2{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:640px){.grid2{grid-template-columns:1fr 1fr;gap:16px}}
.grid2c{display:grid;grid-template-columns:1fr 1fr;gap:8px}
label{font-size:11px;color:#6b7280;margin-bottom:3px;display:block;font-weight:500}
input[type=text],input[type=date],input[type=number],input[type=email],input[type=tel],select,textarea{border:1px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;width:100%;color:#1a1a1a;-webkit-appearance:none}
textarea{resize:vertical;min-height:60px}
.li{border:none;border-bottom:1px solid #d1d5db;border-radius:0;padding:4px 6px;font-size:12px;width:100%}
.li:focus{outline:none;border-bottom:2px solid #1a1a1a}
.totals-box{display:flex;justify-content:flex-end;margin-top:14px}
.totals-inner{min-width:220px}
.total-row{display:flex;justify-content:space-between;padding:5px 0;border-top:1px solid #f3f4f6}
.total-row.bold{border-top:2px solid #c8001e;margin-top:6px;padding-top:9px}
.total-row.bold span{font-weight:700}
.total-row.bold .amount{font-size:17px;color:#c8001e}
.status-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;display:inline-block}
.list-item{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;flex-wrap:wrap}
@media(min-width:480px){.list-item{padding:14px 20px;align-items:center}}
.empty-state{text-align:center;padding:50px 0;color:#9ca3af}
.nav-tabs{display:flex;border-bottom:2px solid #e5e7eb;margin-bottom:18px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:10px 14px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:#6b7280;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap;flex-shrink:0}
@media(min-width:480px){.nav-tab{padding:10px 18px;font-size:13px}}
.nav-tab.active{color:#c8001e;border-bottom-color:#c8001e}
.avatar{width:38px;height:38px;border-radius:50%;background:#ffeef0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#c8001e;flex-shrink:0}
.contact-row{display:grid;grid-template-columns:1fr;gap:8px;padding:10px;background:#fafafa;border-radius:8px;border:1px solid #f3f4f6;margin-bottom:8px}
@media(min-width:640px){.contact-row{grid-template-columns:1fr 1fr 1fr 1fr auto}}
.prod-card{background:#fafafa;border:1px solid #e5e7eb;border-radius:10px;padding:20px 12px 14px;margin-bottom:12px;position:relative}
.prod-num{position:absolute;top:-10px;left:12px;width:22px;height:22px;background:#c8001e;color:#fff;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.prod-grid-top{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:8px}
@media(min-width:480px){.prod-grid-top{grid-template-columns:2fr 1fr 1fr}}
.prod-grid-bot{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:end}
@media(min-width:640px){.prod-grid-bot{grid-template-columns:1fr 1fr 1fr 1fr 1fr auto}}
.client-grid{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:480px){.client-grid{grid-template-columns:1fr 1fr}}
@media(min-width:768px){.client-grid{grid-template-columns:1fr 1fr 1fr 1fr}}
.tva-select{display:flex;align-items:center;gap:10px;margin-top:12px;padding:10px 14px;background:#fafafa;border-radius:8px;border:1px solid #e5e7eb;flex-wrap:wrap}
.quick-actions{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:640px){.modal-overlay{align-items:center}}
.modal{background:#fff;border-radius:12px 12px 0 0;padding:24px 20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
@media(min-width:640px){.modal{border-radius:12px;padding:28px}}
.modal-title{font-size:18px;font-weight:700;margin-bottom:18px}
.attach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:12px}
.attach-item{border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;position:relative;background:#fff}
.attach-item img{width:100%;height:140px;object-fit:contain;display:block;background:#fafafa}
.attach-pdf{width:100%;height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fafafa;gap:8px}
.attach-name{font-size:11px;color:#6b7280;padding:6px 8px;border-top:1px solid #f3f4f6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.attach-del{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.drop-zone{border:2px dashed #d1d5db;border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all .15s;position:relative;margin-bottom:8px}
.drop-zone:hover{border-color:#7c3aed;background:#faf5ff}
.com-check{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid #e5e7eb;cursor:pointer;background:#fff;transition:all .15s}
.com-check:hover{border-color:#c8001e}
.com-check.selected{border-color:#c8001e;background:#fff8f8}
.preview-doc{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:24px 20px 0}
@media(min-width:640px){.preview-doc{padding:40px 48px 0}}
.preview-header{display:flex;flex-direction:column;gap:16px;margin-bottom:24px;border-bottom:3px solid #c8001e;padding-bottom:20px}
@media(min-width:480px){.preview-header{flex-direction:row;justify-content:space-between;align-items:flex-start}}
.preview-title-block{text-align:left}
@media(min-width:480px){.preview-title-block{text-align:right}}
.preview-table{width:100%;border-collapse:collapse;margin-bottom:8px;font-size:12px}
.preview-table th{padding:6px;font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;border-bottom:2px solid #1a1a1a}
.preview-table td{padding:8px 6px;border-bottom:1px solid #f3f4f6;vertical-align:top}
.attach-preview-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:480px){.attach-preview-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}
.fi{animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
#sync-bar{position:fixed;bottom:16px;right:16px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;z-index:9999;transition:opacity .5s;box-shadow:0 2px 8px rgba(0,0,0,.15);opacity:0}
</style>
</head>

// ===================== STATE =====================
let supa=null;
let supaReady=false;
let quotes=[],bcList=[],bpList=[];
let counter=1,bcCounter=1,bpCounter=1;
let globalComs=[],clients=[],clientCounter=1;
let view="list",cur=null,mainTab="devis";

// ===================== SYNC UI =====================
function showSync(msg,status){
  const el=document.getElementById("sync-bar");
  if(!el)return;
  el.textContent=msg;
  el.style.background=status==="ok"?"#d1fae5":status==="err"?"#fecaca":"#e0f2fe";
  el.style.color=status==="ok"?"#065f46":status==="err"?"#991b1b":"#0369a1";
  el.style.opacity="1";
  if(status!=="loading"){setTimeout(()=>{el.style.opacity="0";},3000);}
}

// ===================== LOCAL STORAGE =====================
function saveLocal(){
  try{localStorage.setItem("melange_v7",JSON.stringify({quotes,bcList,bpList,counter,bcCounter,bpCounter,globalComs,clients,clientCounter}));}catch(e){}
}
function loadLocal(){
  try{
    const d=localStorage.getItem("melange_v7");
    if(d){const p=JSON.parse(d);quotes=p.quotes||[];bcList=p.bcList||[];bpList=p.bpList||[];counter=p.counter||1;bcCounter=p.bcCounter||1;bpCounter=p.bpCounter||1;globalComs=p.globalComs||[];clients=p.clients||[];clientCounter=p.clientCounter||1;}
  }catch(e){}
}

// ===================== SUPABASE SYNC =====================
async function saveAll(){
  saveLocal();
  if(!supaReady||!supa){showSync("💾 Sauvegardé en local","err");return;}
  showSync("⏳ Sauvegarde..","loading");
  try{
    const upsert=async(table,arr)=>{
      if(!arr||!arr.length)return;
      const rows=arr.map(item=>({id:String(item.id),data:item}));
      const {error}=await supa.from(table).upsert(rows,{onConflict:"id"});
      if(error)throw error;
    };
    await upsert("quotes",quotes);
    await upsert("bc_list",bcList);
    await upsert("bp_list",bpList);
    await upsert("global_coms",globalComs);
    await upsert("clients",clients);
    await supa.from("counters").upsert({id:"main",counter,bc_counter:bcCounter,bp_counter:bpCounter,client_counter:clientCounter},{onConflict:"id"});
    showSync("✅ Sauvegardé","ok");
  }catch(e){
    console.error("Save error:",e);
    showSync("⚠️ Local uniquement","err");
  }
}

async function loadFromSupabase(){
  showSync("⏳ Connexion..","loading");
  try{
    const [r1,r2,r3,r4,r5,r6]=await Promise.all([
      supa.from("quotes").select("data"),
      supa.from("bc_list").select("data"),
      supa.from("bp_list").select("data"),
      supa.from("global_coms").select("data"),
      supa.from("clients").select("data"),
      supa.from("counters").select("*").eq("id","main").maybeSingle()
    ]);
    if(r1.error)throw r1.error;
    quotes=r1.data?r1.data.map(r=>r.data):[];
    bcList=r2.data&&!r2.error?r2.data.map(r=>r.data):[];
    bpList=r3.data&&!r3.error?r3.data.map(r=>r.data):[];
    globalComs=r4.data&&!r4.error?r4.data.map(r=>r.data):[];
    clients=r5.data&&!r5.error?r5.data.map(r=>r.data):[];
    if(r6.data){counter=r6.data.counter||1;bcCounter=r6.data.bc_counter||1;bpCounter=r6.data.bp_counter||1;clientCounter=r6.data.client_counter||1;}
    supaReady=true;
    showSync("✅ Synchronisé","ok");
    render();
  }catch(e){
    console.error("Load error:",e);
    showSync("⚠️ Mode hors ligne","err");
    loadLocal();
    render();
  }
}

const fmt=n=>{const v=Number(n);if(isNaN(v))return"0,00 €";return v.toFixed(2).replace(".",",")+" €";};
const fmtW=n=>{const v=Number(n);if(isNaN(v))return"0,00 €";return v.toLocaleString("fr-FR",{minimumFractionDigits:2,maximumFractionDigits:2})+" €";};
const cT=(lines,tva)=>{const ht=lines.reduce((s,l)=>s+parseFloat(l.price||0),0);return{ht,tva:ht*(tva/100),ttc:ht*(1+tva/100)};};
const initials=n=>{const p=(n||"").trim().split(" ");return((p[0]||"")[0]||"")+((p[1]||"")[0]||"");};

function cloneDoc(q,type){const b=JSON.parse(JSON.stringify(q));b.id=Date.now()+Math.random();b._type=type;b.sourceNum=q.number;b.number=(type==="bc"?"BC-":"BP-")+("+"+(type==="bc"?bcCounter:bpCounter)).padStart(4,"0").slice(1);b.attachments=[];return b;}

async function quickDoc(id,type,e){
  e.stopPropagation();
  const q=quotes.find(q=>q.id==id);if(!q)return;
  if(!confirm("Créer un "+( type==="bc"?"Bon de commande":"Bon de production")+" depuis "+q.number+" ?"))return;
  const doc=cloneDoc(q,type);
  if(type==="bc"){doc.number="BC-"+(""+bcCounter).padStart(4,"0");bcCounter++;bcList.push(doc);}
  else{doc.number="BP-"+(""+bpCounter).padStart(4,"0");bpCounter++;bpList.push(doc);}
  const qi=quotes.findIndex(x=>x.id==id);
  if(qi>=0)quotes[qi].status="Accepté";
  await saveAll();mainTab=type;render();
}

function handleFiles(files){
  if(!cur.attachments)cur.attachments=[];
  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{cur.attachments.push({name:file.name,type:file.type,data:e.target.result});saveAll().then(()=>rAttachGrid());};
    reader.readAsDataURL(file);
  });
}
async function rmAttach(i){cur.attachments.splice(i,1);await saveAll();rAttachGrid();}
function rAttachGrid(){
  const el=$("attach-grid");if(!el)return;
  if(!cur.attachments||!cur.attachments.length){el.innerHTML='<p style="font-size:12px;color:#9ca3af;padding:8px 0">Aucune pièce jointe.</p>';return;}
  el.innerHTML=cur.attachments.map((a,i)=>'<div class="attach-item">'+(a.type&&a.type.startsWith("image/")?'<img src="'+a.data+'" alt="'+a.name+'" loading="lazy"/>':'<div class="attach-pdf"><div style="font-size:40px">📄</div><div style="font-size:12px;color:#6b7280">PDF</div></div>')+'<div class="attach-name">'+a.name+'</div><button class="attach-del" onclick="rmAttach('+i+')">×</button></div>').join("");
}

function rLines(){

}
function addGCom(){globalComs.push({id:Date.now(),name:"",email:"",phone:""});rSettings();}

async function saveSettings(){

function openNew(){

function oEdit(id,type){

  else if(type==="bp"){cur=JSON.parse(JSON.stringify(bpList.find(b=>b.id===id)));cur._type="bp";}
  else{cur=JSON.parse(JSON.stringify(quotes.find(q=>q.id===id)));}
  view="edit";render();
}
function oPrev(id,type){
  id=parseFloat(id);
  if(type==="bc"){cur=JSON.parse(JSON.stringify(bcList.find(b=>b.id===id)));cur._type="bc";}
  else if(type==="bp"){cur=JSON.parse(JSON.stringify(bpList.find(b=>b.id===id)));cur._type="bp";}
  else{cur=JSON.parse(JSON.stringify(quotes.find(q=>q.id===id)));}
  view="preview";render();

async function savDoc(){
  const t=cur._type;
  if(t==="bc"){const i=bcList.findIndex(b=>b.id===cur.id);if(i>=0)bcList[i]=cur;else bcList.push(cur);}
  else if(t==="bp"){const i=bpList.findIndex(b=>b.id===cur.id);if(i>=0)bpList[i]=cur;else bpList.push(cur);}
  else{const i=quotes.findIndex(q=>q.id===cur.id);if(i>=0)quotes[i]=cur;else quotes.push(cur);}
  await saveAll();view="list";render();
}
async function delDoc(id,type){
  id=parseFloat(id);if(!confirm("Supprimer ?"))return;
  if(type==="bc"){
    if(supa&&supaReady)await supa.from("bc_list").delete().eq("id",String(id));
    bcList=bcList.filter(b=>b.id!==id);saveLocal();rDocItems("bc");
  }else if(type==="bp"){
    if(supa&&supaReady)await supa.from("bp_list").delete().eq("id",String(id));
    bpList=bpList.filter(b=>b.id!==id);saveLocal();rDocItems("bp");
  }else{
    if(supa&&supaReady)await supa.from("quotes").delete().eq("id",String(id));
    quotes=quotes.filter(q=>q.id!==id);saveLocal();rQItems();
  }
}
async function dupQ(id){
  id=parseFloat(id);
  const q=quotes.find(q=>q.id===id);
  const d={...JSON.parse(JSON.stringify(q)),id:Date.now(),number:"DEV-"+(""+counter).padStart(4,"0"),status:"Brouillon"};
  counter++;quotes.push(d);await saveAll();rQItems();
}

function exportData(){
  const data={quotes,bcList,bpList,counter,bcCounter,bpCounter,globalComs,clients,clientCounter,exportDate:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="melange-"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(url);
}
function importData(){
  const input=document.createElement("input");input.type="file";input.accept=".json";
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!confirm("Importer ? Les données actuelles seront remplacées."))return;
        quotes=d.quotes||[];bcList=d.bcList||[];bpList=d.bpList||[];counter=d.counter||1;bcCounter=d.bcCounter||1;bpCounter=d.bpCounter||1;globalComs=d.globalComs||[];clients=d.clients||[];clientCounter=d.clientCounter||1;
        await saveAll();alert("Importé !");render();
      }catch(err){alert("Erreur : "+err.message);}
    };reader.readAsText(file);
  };input.click();
}
